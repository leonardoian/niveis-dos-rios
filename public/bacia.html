<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Mapa da bacia — Níveis dos Rios</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --linha: #e3e5ea;
    --txt: #16181d;
    --txt2: #5f6470;
    --txt3: #8b909c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--txt);
    padding: 24px 16px 48px;
    line-height: 1.5;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header { margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 600; }
  .sub { font-size: 13px; color: var(--txt3); margin-top: 2px; }
  .voltar { font-size: 13px; color: var(--txt2); text-decoration: none; }
  .voltar:hover { text-decoration: underline; }
  .aviso { background: #fff6e5; border: 1px solid #f0d4a0; color: #6b4c15; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin: 16px 0; }

  .bacia { margin-top: 28px; }
  .tier { text-align: center; }
  .tier h2 { font-size: 14px; font-weight: 600; color: var(--txt2); margin-bottom: 10px; }
  .estacoes { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

  .conector { text-align: center; font-size: 22px; color: var(--txt3); margin: 10px 0; }

  .confluencia {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 28px;
    padding: 18px 0; margin: 4px 0;
    border-top: 1px dashed var(--linha); border-bottom: 1px dashed var(--linha);
  }
  .confluencia .tier { min-width: 160px; }
  .legenda-confluencia { text-align: center; font-size: 12px; color: var(--txt3); margin: 6px 0 4px; }
  .foz { text-align: center; font-size: 13px; color: var(--txt3); margin-top: 4px; }

  .pill {
    background: var(--card); border: 1px solid var(--linha); border-left: 4px solid var(--txt3);
    border-radius: 8px; padding: 8px 12px; min-width: 130px; text-align: left;
  }
  .pill.normal   { border-left-color: #639922; }
  .pill.atencao  { border-left-color: #ba7517; }
  .pill.alerta   { border-left-color: #ef9f27; }
  .pill.alagado  { border-left-color: #e24b4a; }
  .pill.sem_dado { border-left-color: #c9ccd2; }
  .pill-cidade { font-size: 13px; font-weight: 600; }
  .pill-nivel { font-size: 15px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .pill-tag { font-size: 10px; color: var(--txt3); text-transform: uppercase; letter-spacing: .3px; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="voltar" href="index.html">← voltar pro painel</a>
    <h1>Mapa da bacia — caminho dos rios</h1>
    <p class="sub" id="sub">Carregando…</p>
  </header>

  <div id="aviso"></div>

  <div class="bacia">
    <section class="tier">
      <h2>Rio Alto Taquari (nascente)</h2>
      <div class="estacoes" id="tier-alto-taquari"></div>
    </section>
    <div class="conector">↓</div>

    <section class="tier">
      <h2>Rio Taquari</h2>
      <div class="estacoes" id="tier-taquari"></div>
    </section>
    <div class="conector">↓</div>

    <div class="confluencia">
      <section class="tier">
        <h2>Rio Jacuí</h2>
        <div class="estacoes" id="tier-jacui"></div>
      </section>
      <section class="tier">
        <h2>Rio Caí</h2>
        <div class="estacoes" id="tier-cai"></div>
      </section>
      <section class="tier">
        <h2>Rio dos Sinos</h2>
        <div class="estacoes" id="tier-sinos"></div>
      </section>
      <section class="tier">
        <h2>Rio Gravataí</h2>
        <div class="estacoes" id="tier-gravatai"></div>
      </section>
    </div>
    <p class="legenda-confluencia">↓ todos se encontram no Delta do Jacuí ↓</p>

    <section class="tier">
      <h2>Guaíba</h2>
      <div class="estacoes" id="tier-guaiba"></div>
    </section>
    <div class="conector">↓</div>
    <p class="foz">Lagoa dos Patos → Oceano Atlântico</p>
  </div>
</div>

<script>
const ROTULOS = { normal: 'Normal', atencao: 'Atenção', alerta: 'Alerta', alagado: 'Alagado', sem_dado: 'Sem dado' };

// Hierarquia da bacia (fato de geografia, não vem do banco): qual rio
// deságua em qual, e em que grupo cada estação monitorada se encaixa.
const TIERS = [
  { id: 'tier-alto-taquari', slugs: ['rocasales', 'mucum', 'encantado'] },
  { id: 'tier-taquari',      slugs: ['lajeado', 'bomretirodosul'] },
  { id: 'tier-jacui',        slugs: ['riopardo', 'cachoeiradosul', 'donafrancisca'] },
  { id: 'tier-cai',          slugs: ['feliz', 'saosebastiaodocai'] },
  { id: 'tier-sinos',        slugs: ['taquara', 'saoleopoldo'] },
  { id: 'tier-gravatai',     slugs: ['gravatai'] },
  { id: 'tier-guaiba',       slugs: ['portoalegre'] },
];

function hora(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
  });
}

function pill(e) {
  const nivel = e.nivel === null ? '—' : e.nivel.toFixed(2) + ' m';
  return `<div class="pill ${e.status}">
    <div class="pill-cidade">${e.cidade}/${e.uf}</div>
    <div class="pill-nivel">${nivel}</div>
    <div class="pill-tag">${ROTULOS[e.status]}</div>
  </div>`;
}

async function carregar() {
  try {
    const r = await fetch('/api/painel');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const dados = await r.json();
    document.getElementById('aviso').innerHTML = '';

    const porSlug = new Map(dados.estacoes.map((e) => [e.slug, e]));

    for (const tier of TIERS) {
      const alvo = document.getElementById(tier.id);
      if (!alvo) continue;
      alvo.innerHTML = tier.slugs
        .map((slug) => porSlug.get(slug))
        .filter(Boolean)
        .map(pill)
        .join('');
    }

    document.getElementById('sub').textContent =
      dados.estacoes.length + ' estações · atualizado ' + hora(dados.atualizadoEm);
  } catch (e) {
    document.getElementById('aviso').innerHTML =
      '<div class="aviso">Não foi possível carregar os dados: ' + e.message + '</div>';
  }
}

carregar();
setInterval(carregar, 5 * 60 * 1000);
</script>
</body>
</html>
