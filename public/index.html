<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Monitoramento de Níveis — Uso Interno</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --linha: #e3e5ea;
    --txt: #16181d;
    --txt2: #5f6470;
    --txt3: #8b909c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--txt);
    padding: 24px 16px 48px;
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  h1 { font-size: 20px; font-weight: 600; }
  .sub { font-size: 13px; color: var(--txt3); margin-top: 2px; }
  .acoes { display: flex; gap: 8px; align-items: center; }
  select, button {
    font: inherit; font-size: 13px; padding: 7px 12px;
    border: 1px solid var(--linha); border-radius: 7px;
    background: var(--card); color: var(--txt); cursor: pointer;
  }
  button:hover { background: var(--bg); }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--card); border: 1px solid var(--linha); border-radius: 10px; padding: 14px 16px; }
  .kpi span { display: block; font-size: 12px; color: var(--txt2); }
  .kpi strong { display: block; font-size: 26px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .card {
    background: var(--card); border: 1px solid var(--linha); border-radius: 12px; padding: 16px 18px;
    cursor: pointer; transition: box-shadow .15s, transform .15s;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
  .card.alagado { border-color: #e24b4a; }
  .card.alerta  { border-color: #ef9f27; }
  .topo { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .cidade { font-size: 15px; font-weight: 600; }
  .rio { font-size: 13px; color: var(--txt2); margin-top: 1px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; text-transform: uppercase; letter-spacing: .3px; }
  .tag.normal   { background: #eaf3de; color: #27500a; }
  .tag.atencao  { background: #faeeda; color: #633806; }
  .tag.alerta   { background: #faeeda; color: #633806; }
  .tag.alagado  { background: #fcebeb; color: #791f1f; }
  .tag.sem_dado { background: #eeeeee; color: #666666; }
  .nivel { font-size: 30px; font-weight: 600; margin-top: 12px; font-variant-numeric: tabular-nums; }
  .nivel small { font-size: 14px; font-weight: 400; color: var(--txt3); }
  .vel { font-size: 13px; color: var(--txt2); margin-top: 2px; }
  .vel.sobe { color: #a32d2d; }
  .vel.desce { color: #3b6d11; }
  .barra { height: 6px; border-radius: 3px; background: #eceef2; overflow: hidden; margin: 14px 0 6px; }
  .barra i { display: block; height: 100%; }
  .spark-wrap { height: 32px; margin: 10px 0 2px; }
  .spark-wrap.vazio { display: flex; align-items: center; font-size: 11px; color: var(--txt3); }
  .spark-legenda { font-size: 11px; color: var(--txt3); text-align: right; margin-top: 1px; }
  .rodape { display: flex; justify-content: space-between; font-size: 12px; color: var(--txt3); }
  .meta { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--linha); font-size: 11px; color: var(--txt3); }
  .aviso { background: #fff6e5; border: 1px solid #f0d4a0; color: #6b4c15; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(22,24,29,.55);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 50;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: var(--card); border-radius: 12px; padding: 20px 22px;
    width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal-topo { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .modal-cidade { font-size: 17px; font-weight: 600; }
  .modal-rio { font-size: 13px; color: var(--txt2); margin-top: 2px; }
  .modal-fechar {
    border: none; background: none; font-size: 18px; line-height: 1; cursor: pointer;
    color: var(--txt3); padding: 4px 8px; border-radius: 6px;
  }
  .modal-fechar:hover { background: var(--bg); color: var(--txt); }
  .modal-janelas { display: flex; gap: 8px; margin: 14px 0; }
  .janela-btn { font-size: 12px; padding: 6px 12px; }
  .janela-btn.ativo { background: var(--txt); color: #fff; border-color: var(--txt); }
  .modal-corpo { position: relative; height: 300px; }
  .modal-vazio { text-align: center; color: var(--txt3); font-size: 13px; padding: 60px 20px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Níveis dos rios — Bacia do Guaíba</h1>
      <p class="sub" id="sub">Carregando…</p>
      <p class="sub" id="proxColeta"></p>
    </div>
    <div class="acoes">
      <select id="ordem">
        <option value="risco">Ordenar por risco</option>
        <option value="cidade">Ordenar por cidade</option>
        <option value="rio">Ordenar por rio</option>
      </select>
      <button id="atualizar">Atualizar</button>
      <a href="bacia.html" target="_blank" rel="noopener">
        <button type="button">Mapa da bacia ↗</button>
      </a>
    </div>
  </header>

  <div id="aviso"></div>

  <div class="kpis">
    <div class="kpi"><span>Em alerta</span><strong id="k-alerta">—</strong></div>
    <div class="kpi"><span>Acima da cota</span><strong id="k-alagado">—</strong></div>
    <div class="kpi"><span>Subindo</span><strong id="k-subindo">—</strong></div>
    <div class="kpi"><span>Guaíba / Porto Alegre</span><strong id="k-poa">—</strong></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalCidade">
    <div class="modal-topo">
      <div>
        <div class="modal-cidade" id="modalCidade">—</div>
        <div class="modal-rio" id="modalRio">—</div>
      </div>
      <button class="modal-fechar" id="modalFechar" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-janelas">
      <button class="janela-btn" data-horas="24">24h</button>
      <button class="janela-btn" data-horas="72">3d</button>
      <button class="janela-btn" data-horas="168">7d</button>
      <button class="janela-btn" data-horas="720">30d</button>
    </div>
    <div class="modal-corpo">
      <canvas id="graficoHistorico"></canvas>
      <p class="modal-vazio" id="modalVazio" hidden></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
const ROTULOS = { normal: 'Normal', atencao: 'Atenção', alerta: 'Alerta', alagado: 'Alagado', sem_dado: 'Sem dado' };
const CORES   = { normal: '#639922', atencao: '#ba7517', alerta: '#ef9f27', alagado: '#e24b4a', sem_dado: '#c9ccd2' };

let dados = null;
let timerColeta = null;
let proximaColetaEm = null;

// A coleta roda a cada 15 min (ver .github/workflows/coletar.yml); a
// contagem é só uma estimativa a partir da leitura mais recente — o GitHub
// Actions pode atrasar alguns minutos, então perto de zero vira um aviso
// de atraso em vez de um número negativo.
const INTERVALO_COLETA_MS = 15 * 60 * 1000;

function iniciarContagemColeta(ultimaColetaIso) {
  clearInterval(timerColeta);
  const el = document.getElementById('proxColeta');
  if (!ultimaColetaIso) {
    if (el) el.textContent = '';
    proximaColetaEm = null;
    return;
  }
  proximaColetaEm = new Date(ultimaColetaIso).getTime() + INTERVALO_COLETA_MS;
  atualizarContagem();
  timerColeta = setInterval(atualizarContagem, 1000);
}

function atualizarContagem() {
  const el = document.getElementById('proxColeta');
  if (!el || proximaColetaEm === null) return;

  const restante = proximaColetaEm - Date.now();
  if (restante <= 0) {
    const atrasoMin = Math.floor(-restante / 60000);
    el.textContent = atrasoMin < 1
      ? '⏱ atualizando a qualquer momento'
      : `⏱ atrasado ${atrasoMin} min`;
    return;
  }

  const min = String(Math.floor(restante / 60000)).padStart(2, '0');
  const seg = String(Math.floor((restante % 60000) / 1000)).padStart(2, '0');
  el.textContent = `⏱ próxima coleta em ${min}:${seg}`;
}

async function carregar() {
  const btn = document.getElementById('atualizar');
  btn.disabled = true;
  btn.textContent = 'Atualizando…';
  try {
    const r = await fetch('/api/painel');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    dados = await r.json();
    document.getElementById('aviso').innerHTML = '';
    render();
    iniciarContagemColeta(dados.ultimaColeta);
  } catch (e) {
    document.getElementById('aviso').innerHTML =
      '<div class="aviso">Não foi possível carregar os dados: ' + e.message + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Atualizar';
  }
}

function hora(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
  });
}

function card(e) {
  const pct = e.percentualCota === null ? 0 : Math.min(100, e.percentualCota);
  const cor = CORES[e.status];
  const nivel = e.nivel === null ? '—' : e.nivel.toFixed(2);

  let vel = '<p class="vel">Tendência indisponível</p>';
  if (e.velocidadeCmH !== null) {
    const cls = e.velocidadeCmH > 0 ? 'sobe' : e.velocidadeCmH < 0 ? 'desce' : '';
    const seta = e.velocidadeCmH > 0 ? '▲' : e.velocidadeCmH < 0 ? '▼' : '■';
    vel = `<p class="vel ${cls}">${seta} ${Math.abs(e.velocidadeCmH).toFixed(1)} cm/h</p>`;
  }

  const margem = e.margem === null ? '—'
    : e.margem >= 0 ? e.margem.toFixed(2) + ' m abaixo'
    : Math.abs(e.margem).toFixed(2) + ' m acima';

  const temSerie = Array.isArray(e.serieRecente) && e.serieRecente.length >= 2;
  let spark;
  if (temSerie) {
    const niveis = e.serieRecente.map((p) => p.nivel);
    const min = Math.min(...niveis);
    const max = Math.max(...niveis);
    spark = `<div class="spark-wrap"><canvas id="spark-${e.slug}"></canvas></div>
      <div class="spark-legenda">mín ${min.toFixed(2)} · máx ${max.toFixed(2)} m (últimas leituras)</div>`;
  } else {
    spark = `<div class="spark-wrap vazio">Sem histórico suficiente</div>`;
  }

  return `<div class="card ${e.status}" data-slug="${e.slug}">
    <div class="topo">
      <div>
        <div class="cidade">${e.cidade}/${e.uf}</div>
        <div class="rio">${e.rio}</div>
      </div>
      <span class="tag ${e.status}">${ROTULOS[e.status]}</span>
    </div>
    <p class="nivel">${nivel}<small> m</small></p>
    ${vel}
    ${spark}
    <div class="barra"><i style="width:${pct}%;background:${cor}"></i></div>
    <div class="rodape">
      <span>Cota ${e.cota.toFixed(2)} m</span>
      <span>${margem}</span>
    </div>
    <div class="meta">${e.estacao || 'Estação não informada'} · ${hora(e.medidoEm)}</div>
  </div>`;
}

function render() {
  if (!dados) return;
  const ordem = document.getElementById('ordem').value;
  const lista = [...dados.estacoes];

  if (ordem === 'cidade') lista.sort((a, b) => a.cidade.localeCompare(b.cidade));
  else if (ordem === 'rio') lista.sort((a, b) => a.rio.localeCompare(b.rio) || a.cidade.localeCompare(b.cidade));
  else lista.sort((a, b) => (b.percentualCota ?? -1) - (a.percentualCota ?? -1));

  document.getElementById('grid').innerHTML = lista.map(card).join('');
  document.getElementById('k-alerta').textContent = dados.resumo.emAlerta;
  document.getElementById('k-alagado').textContent = dados.resumo.acimaDaCota;
  document.getElementById('k-subindo').textContent = dados.resumo.subindo;

  const poa = dados.estacoes.find(e => e.slug === 'portoalegre');
  document.getElementById('k-poa').textContent = poa && poa.nivel !== null ? poa.nivel.toFixed(2) + ' m' : '—';
  document.getElementById('sub').textContent =
    dados.estacoes.length + ' estações · atualizado ' + hora(dados.atualizadoEm);

  desenharSparklines(lista);
}

// ---- Mini-gráficos de tendência nos cards ----
let sparklines = new Map();

function desenharSparklines(lista) {
  sparklines.forEach((c) => c.destroy());
  sparklines.clear();

  for (const e of lista) {
    if (!Array.isArray(e.serieRecente) || e.serieRecente.length < 2) continue;
    const canvas = document.getElementById('spark-' + e.slug);
    if (!canvas) continue;

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: e.serieRecente.map(() => ''),
        datasets: [{
          data: e.serieRecente.map((p) => p.nivel),
          borderColor: CORES[e.status],
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: { x: { display: false }, y: { display: false } },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
      },
    });
    sparklines.set(e.slug, chart);
  }
}

document.getElementById('ordem').addEventListener('change', render);
document.getElementById('atualizar').addEventListener('click', carregar);
carregar();
setInterval(carregar, 5 * 60 * 1000);

// ---- Gráfico de histórico (modal) ----
let chartInstancia = null;
let slugAtual = null;
let janelaAtual = 24;

function abrirHistorico(slug) {
  const estacao = dados && dados.estacoes.find((e) => e.slug === slug);
  if (!estacao) return;

  slugAtual = slug;
  document.getElementById('modalCidade').textContent = estacao.cidade + '/' + estacao.uf;
  document.getElementById('modalRio').textContent = estacao.rio;
  document.getElementById('modalOverlay').hidden = false;
  document.body.style.overflow = 'hidden';
  selecionarJanela(24);
}

function fecharHistorico() {
  document.getElementById('modalOverlay').hidden = true;
  document.body.style.overflow = '';
  if (chartInstancia) {
    chartInstancia.destroy();
    chartInstancia = null;
  }
  slugAtual = null;
}

function selecionarJanela(horas) {
  janelaAtual = horas;
  document.querySelectorAll('.janela-btn').forEach((b) => {
    b.classList.toggle('ativo', Number(b.dataset.horas) === horas);
  });
  carregarHistorico();
}

async function carregarHistorico() {
  if (!slugAtual) return;
  const canvas = document.getElementById('graficoHistorico');
  const vazio = document.getElementById('modalVazio');
  canvas.hidden = false;
  vazio.hidden = true;

  try {
    const r = await fetch(`/api/historico?slug=${encodeURIComponent(slugAtual)}&horas=${janelaAtual}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const resposta = await r.json();
    desenharGrafico(resposta);
  } catch (e) {
    if (chartInstancia) {
      chartInstancia.destroy();
      chartInstancia = null;
    }
    canvas.hidden = true;
    vazio.hidden = false;
    vazio.textContent = 'Não foi possível carregar o histórico: ' + e.message;
  }
}

function desenharGrafico(resposta) {
  const canvas = document.getElementById('graficoHistorico');
  const vazio = document.getElementById('modalVazio');
  const pontos = resposta.pontos;

  if (chartInstancia) {
    chartInstancia.destroy();
    chartInstancia = null;
  }

  // Uma linha com 0 ou 1 ponto não forma série — mostra mensagem em vez de gráfico vazio.
  if (pontos.length < 2) {
    canvas.hidden = true;
    vazio.hidden = false;
    vazio.textContent = pontos.length === 0
      ? 'Nenhuma leitura registrada nessa janela.'
      : 'Apenas uma leitura registrada nessa janela — sem dados suficientes para o gráfico.';
    return;
  }

  canvas.hidden = false;
  vazio.hidden = true;

  const estacaoPainel = dados.estacoes.find((e) => e.slug === slugAtual);
  const cor = CORES[estacaoPainel ? estacaoPainel.status : 'sem_dado'];
  const cota = resposta.estacao.cota;

  chartInstancia = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: pontos.map((p) => hora(p.medidoEm)),
      datasets: [
        {
          label: resposta.estacao.cidade,
          data: pontos.map((p) => p.nivel),
          borderColor: cor,
          backgroundColor: cor,
          pointRadius: 2,
          pointHoverRadius: 4,
          borderWidth: 2,
          tension: 0.25,
          fill: false,
        },
        {
          label: 'Cota de inundação (' + cota.toFixed(2) + ' m)',
          data: pontos.map(() => cota),
          borderColor: '#8b909c',
          borderDash: [6, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          ticks: { autoSkip: true, maxRotation: 0, color: '#5f6470' },
          grid: { display: false },
        },
        y: {
          ticks: { color: '#5f6470', callback: (v) => Number(v).toFixed(2) },
          title: { display: true, text: 'Metros' },
        },
      },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: {
          callbacks: {
            title: (items) => new Date(pontos[items[0].dataIndex].medidoEm).toLocaleString('pt-BR'),
            label: (ctx) => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + ' m',
          },
        },
      },
    },
  });
}

document.getElementById('grid').addEventListener('click', (ev) => {
  const card = ev.target.closest('.card');
  if (card && card.dataset.slug) abrirHistorico(card.dataset.slug);
});
document.getElementById('modalFechar').addEventListener('click', fecharHistorico);
document.getElementById('modalOverlay').addEventListener('click', (ev) => {
  if (ev.target.id === 'modalOverlay') fecharHistorico();
});
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape' && !document.getElementById('modalOverlay').hidden) fecharHistorico();
});
document.querySelectorAll('.janela-btn').forEach((b) => {
  b.addEventListener('click', () => selecionarJanela(Number(b.dataset.horas)));
});
</script>
</body>
</html>
